<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Reverse of string</h2>
</body>
<script>
    var str = "python";
    var reversedStr = "";  
    for (var i = str.length - 1; i >= 0; i--) {
        reversedStr += str[i];
    }
    console.log("Reversed string is: " + reversedStr);
</script>
</html>
